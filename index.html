<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心靈療癒師 | 遇見真實的自己</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;500&display=swap" rel="stylesheet">

    <style>
        /* --- 全局設定 --- */
        :root {
            /* 乾燥玫瑰色系定義 */
            --bg-color: #FDFCFB;     /* 極淡的暖白，像高級水彩紙 */
            --text-main: #5C5050;    /* 帶紅感的深灰，比純黑溫柔 */
            --text-light: #968888;   /* 淺灰藕色 */
            --accent-rose: #B07D7D;  /* 乾燥玫瑰主色 */
            --accent-light: #E8D3D3; /* 淺粉裝飾色 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Noto Serif TC", "Songti TC", serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.9;
            overflow-x: hidden; /* 防止裝飾圖案超出邊界 */
        }

        /* --- 裝飾圖案 (SVG 玫瑰) --- */
        /* 這是背景的裝飾，設定為絕對定位 */
        .deco-rose {
            position: absolute;
            z-index: -1; /* 放在文字後面 */
            opacity: 0.8; /* 稍微透明，不搶戲 */
            pointer-events: none; /* 讓滑鼠可以穿透它點擊按鈕 */
        }

        .rose-top-right {
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            transform: rotate(15deg);
        }

        .rose-bottom-left {
            bottom: 0;
            left: -60px;
            width: 400px;
            height: 400px;
            opacity: 0.5;
            transform: rotate(-20deg);
        }

        /* --- 版面容器 --- */
        .container {
            max-width: 760px; /*稍微縮窄一點，更顯精緻 */
            margin: 0 auto;
            padding: 60px 25px;
            position: relative; /* 為了讓背景圖案定位 */
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 100px 0 60px;
        }

        .subtitle {
            font-family: "Noto Sans TC", sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            color: var(--accent-rose);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: #4A3B3B;
            margin: 0 0 20px 0;
        }

        .intro-text {
            font-size: 1.05rem;
            color: var(--text-light);
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        
        /* 小小的裝飾線 */
        .intro-text::after {
            content: "";
            display: block;
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-rose), transparent);
            margin: 30px auto 0;
        }

        /* --- 關於我 Section --- */
        .profile-section {
            text-align: center;
            margin: 80px 0;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #F2E6E6; /* 淺粉色佔位符 */
            margin: 0 auto 30px;
            /* 這裡加上雙圈線條效果 */
            border: 3px solid #fff;
            box-shadow: 0 0 0 1px var(--accent-light); 
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-rose);
            font-size: 0.9rem;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: normal;
            color: #4A3B3B;
            margin-bottom: 40px;
            text-align: center;
        }

        p {
            margin-bottom: 20px;
            text-align: justify; /* 文字左右對齊，更有書本感 */
            text-justify: inter-ideograph;
        }

        /* 證照標籤 - 改為極簡風格 */
        .credentials {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .badge {
            font-family: "Noto Sans TC", sans-serif;
            font-size: 0.85rem;
            color: var(--accent-rose);
            border: 1px solid var(--accent-light);
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.8);
        }

        /* --- 服務項目 --- */
        .services-list {
            display: grid;
            gap: 25px;
        }

        .service-item {
            background: #fff;
            padding: 35px;
            border-radius: 4px; /* 直角帶一點點圓，比較俐落 */
            border: 1px solid #F7EEEE;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* 滑鼠移過去的優雅效果 */
        .service-item:hover {
            border-color: var(--accent-light);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(176, 125, 125, 0.08);
        }

        .service-item h3 {
            font-size: 1.25rem;
            color: var(--text-main);
            margin: 0 0 10px 0;
        }

        .service-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--accent-rose);
            margin-bottom: 15px;
            font-family: "Noto Sans TC", sans-serif;
        }

        .service-item p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin: 0;
            text-align: left;
        }

        /* --- 預約區塊 --- */
        .booking-section {
            margin-top: 8
